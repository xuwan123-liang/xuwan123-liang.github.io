baseURL = "https://xuwan123-liang.github.io/"
languageCode = "zh-cn"
title = "徐皖亮 | AI & Finance"
theme = "hugo-theme-stack"

[outputs]
    home = ["HTML", "RSS", "JSON"]

[params]
    mainSections = ["post"]
    featuredImageField = "image"

    [params.sidebar]
        avatar = "/images/avatar.jpg" # 确保 static/images/ 文件夹里有 avatar.jpg
        title = "徐皖亮"
        subtitle = "AI & Finance | Tech Blogger"

    [params.colorScheme]
        toggle = true
        default = "auto"
[[menu.main]]
    identifier = "about"
    name = "关于我"
    url = "/about/"
    weight = 10
    params = { icon = "user" } # 使用大括号包裹参数，并用等号赋值

[[menu.main]]
    identifier = "post"
    name = "项目集"
    url = "/post/"
    weight = 20
    params = { icon = "archive" }